name: Auren Deploy

on:
  workflow_call:        # ← called by CI, not triggered independently
    
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to Hostinger via FTP
        run: |
          echo "SERVER empty: ${{ secrets.FTP_SERVER == '' }}"
          echo "USERNAME empty: ${{ secrets.FTP_USERNAME == '' }}"
          echo "PASSWORD empty: ${{ secrets.FTP_PASSWORD == '' }}"